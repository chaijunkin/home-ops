# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: *name
    template:
      data:
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        LITELLM_SALT_KEY: "{{ .LITELLM_SALT_KEY }}"
        GENERIC_CLIENT_ID: "{{ .LITELLM_CLIENT_ID }}"
        GENERIC_CLIENT_SECRET: "{{ .LITELLM_CLIENT_SECRET }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
        MOONSHOT_API_KEY: "{{ .MOONSHOT_API_KEY }}"
        NEURALWATT_API_KEY: "{{ .NEURALWATT_API_KEY }}"
        OPENCODE_API_KEY: "{{ .OPENCODE_API_KEY }}"
        ZAI_API_KEY: "{{ .ZAI_API_KEY }}"
  data:
    - secretKey: LITELLM_MASTER_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: bf2fcc14-bd51-4122-9445-53dacdfb1d69
        property: LITELLM_MASTER_KEY
    - secretKey: LITELLM_SALT_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: bf2fcc14-bd51-4122-9445-53dacdfb1d69
        property: LITELLM_SALT_KEY
    - secretKey: LITELLM_CLIENT_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: bf2fcc14-bd51-4122-9445-53dacdfb1d69
        property: litellm_oauth_client_id
    - secretKey: LITELLM_CLIENT_SECRET
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: bf2fcc14-bd51-4122-9445-53dacdfb1d69
        property: litellm_oauth_client_secret
