# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: huggingface
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: huggingface
    template:
      data:
        HF_TOKEN: "{{ .HF_TOKEN }}"
  data:
    - secretKey: HF_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 9a7113a9-deac-4102-a500-b9480769bd4c
        property: default_read_inference_access_token
