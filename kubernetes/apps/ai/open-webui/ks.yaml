# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-webui
  namespace: ai
spec:
  targetNamespace: ai
  path: ./kubernetes/apps/ai/open-webui/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 24h
  retryInterval: 1m

  postBuild:
    substitute:
      APP: open-webui
      SUBDOMAIN: chat
      VOLSYNC_CAPACITY: 20Gi
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: openebs
      namespace: storage
