---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        ACTUAL_PASSWORD: "{{ .ACTUAL_PASSWORD_SRC }}"
        ACTUAL_SYNC_ID: "{{ .ACTUAL_SYNC_ID }}"
        DISCORD_ADMIN_USER_ID: "{{ .DISCORD_ADMIN_USER_ID }}"
        DISCORD_BOT_TOKEN: "{{ .MISO_BOT_TOKEN }}"
        DISCORD_SERVER_ID: "{{ .DISCORD_SERVER_ID }}"
        DISPATCH_AGENT_TOKEN: "{{ .DISPATCH_AGENT_TOKEN }}"
        DISPATCH_URL: "http://dispatch.llm:3000"
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
        LITELLM_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
        MATCHA_BOT_TOKEN: "{{ .MATCHA_BOT_TOKEN }}"
        MATCHA_CHANNEL_ID: "{{ .MATCHA_CHANNEL_ID }}"
        MISO_GALLERY_API_KEY: "{{ .LLM_API_KEYS }}"
        OPENAI_CODEX_USERNAME: "{{ .OPENAI_CODEX_USERNAME }}"
        SAFFRON_BOT_TOKEN: "{{ .SAFFRON_BOT_TOKEN }}"
        WEATHER_UNDERGROUND_API_KEY: "{{ .WEATHER_UNDERGROUND_API_KEY }}"
        CONTEXT7_API_KEY: "{{ .OPENCLAW_API_KEY }}"
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
  data:
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: OPENCLAW_GATEWAY_TOKEN
    - secretKey: ACTUAL_PASSWORD_SRC
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: ACTUAL_PASSWORD_SRC
    - secretKey: ACTUAL_SYNC_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: ACTUAL_SYNC_ID
    - secretKey: DISCORD_ADMIN_USER_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: DISCORD_ADMIN_USER_ID
    - secretKey: MISO_BOT_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: MISO_BOT_TOKEN
    - secretKey: DISCORD_SERVER_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: DISCORD_SERVER_ID
    - secretKey: DISPATCH_AGENT_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: DISPATCH_AGENT_TOKEN
    - secretKey: GITHUB_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: GITHUB_TOKEN
    - secretKey: LITELLM_MASTER_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: LITELLM_MASTER_KEY
    - secretKey: MATCHA_BOT_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: MATCHA_BOT_TOKEN
    - secretKey: MATCHA_CHANNEL_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: MATCHA_CHANNEL_ID
    - secretKey: LLM_API_KEYS
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: LLM_API_KEYS
    - secretKey: OPENAI_CODEX_USERNAME
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: OPENAI_CODEX_USERNAME
    - secretKey: SAFFRON_BOT_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: SAFFRON_BOT_TOKEN
    - secretKey: WEATHER_UNDERGROUND_API_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: WEATHER_UNDERGROUND_API_KEY
    - secretKey: OPENCLAW_API_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: OPENCLAW_API_KEY
    - secretKey: MEMINI_API_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_OPENCLAW
        property: MEMINI_API_KEY
