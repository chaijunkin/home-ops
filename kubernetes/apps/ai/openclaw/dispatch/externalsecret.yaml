---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name dispatch
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-fields
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        ## OIDC
        DISPATCH_AUTH_MODE: "oidc"
        DISPATCH_OIDC_ISSUER: https://auth.cloudjur.com/application/o/dispatch/
        NEXTAUTH_URL: https://dispatch.cloudjur.com
        ## SECRETS
        DISPATCH_OIDC_CLIENT_ID: "{{ .DISPATCH_CLIENT_ID }}"
        DISPATCH_OIDC_CLIENT_SECRET: "{{ .DISPATCH_CLIENT_SECRET }}"
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        ## EXISTING
        GITHUB_TOKEN: "{{ .GITHUB_TOKEN }}"
        DISPATCH_AGENT_TOKEN: "{{ .DISPATCH_AGENT_TOKEN }}"
        PR_FOLLOWUP_BOT_IDENTITIES: itsmiso-ai
        ## GROOMING
        DISPATCH_LLM_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
  data:
    - secretKey: DISPATCH_CLIENT_ID
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: DISPATCH_CLIENT_ID
    - secretKey: DISPATCH_CLIENT_SECRET
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: DISPATCH_CLIENT_SECRET
    - secretKey: NEXTAUTH_SECRET
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: NEXTAUTH_SECRET
    - secretKey: GITHUB_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: GITHUB_TOKEN
    - secretKey: DISPATCH_AGENT_TOKEN
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: DISPATCH_AGENT_TOKEN
    - secretKey: LITELLM_MASTER_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: PLACEHOLDER_UUID_FOR_DISPATCH
        property: LITELLM_MASTER_KEY
