# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: extended-memory
spec:
  chartRef:
    kind: OCIRepository
    name: extended-memory
  interval: 15m
  dependsOn: []
  values:
    controllers:
      extended-memory:
        containers:
          app:
            image:
              repository: python
              tag: 3.14-alpine
            command:
              - sh
              - -c
              - pip install flask && python3 /app/server.py
            ports:
              - containerPort: 3000
                name: http
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
      configmap:
        type: configMap
        name: extended-memory-py-config
        globalMounts:
          - path: /app/server.py
            subPath: server.py
    route:
      app:
        hostnames: [miso-memory.cloudjur.com]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: 3000
