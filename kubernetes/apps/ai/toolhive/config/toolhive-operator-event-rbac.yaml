# yaml-language-server: $schema=https://crd.cloudjur.com/rbac.authorization.k8s.io/role_1.json
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: toolhive-operator-events
  namespace: ai
rules:
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: toolhive-operator-events
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: toolhive-operator-events
subjects:
  - kind: ServiceAccount
    name: toolhive-operator
    namespace: ai
