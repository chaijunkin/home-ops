# yaml-language-server: $schema=https://crd.cloudjur.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: searxng
spec:
  image: docker.io/isokoliuk/mcp-searxng:1.11.1
  transport: streamable-http
  groupRef:
    name: mcp-tools
  env:
    - name: SEARXNG_URL
      value: http://searxng.default.svc.cluster.local:8080
    - name: MCP_HTTP_PORT
      value: "8080"
