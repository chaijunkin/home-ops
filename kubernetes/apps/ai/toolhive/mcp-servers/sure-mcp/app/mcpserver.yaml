# yaml-language-server: $schema=https://crd.cloudjur.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: sure-mcp
spec:
  image: node:22-alpine
  transport: stdio
  groupRef:
    name: mcp-tools
  podTemplateSpec:
    spec:
      volumes:
        - name: npm-cache
          emptyDir: {}
      containers:
        - name: mcp
          volumeMounts:
            - name: npm-cache
              mountPath: /tmp/.npm
          env:
            - name: npm_config_cache
              value: /tmp/.npm
            - name: MCP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sure-mcp-secret
                  key: MCP_API_TOKEN
          command:
            - npx
          args:
            - -y
            - mcp-remote
            - https://sure.cloudjur.com/mcp
            - --header
            - Authorization=$(MCP_API_TOKEN)
