# yaml-language-server: $schema=https://crd.cloudjur.com/toolhive.stacklok.dev/mcpserverentry_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServerEntry
metadata:
  name: sure-mcp
spec:
  remoteUrl: https://sure.cloudjur.com/mcp
  transport: sse
  groupRef:
    name: mcp-tools
  headerForward:
    addHeadersFromSecret:
      - headerName: Authorization
        valueSecretRef:
          name: sure-mcp-secret
          key: MCP_API_TOKEN
