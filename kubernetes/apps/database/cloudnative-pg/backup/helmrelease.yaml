# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudnative-pg-backup
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      cloudnative-pg-backup:
        type: cronjob
        cronjob:
          schedule: "@daily" # [BACKUP_SCHEDULE]
          ttlSecondsAfterFinished: 43200
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
          enableServiceLinks: false
        containers:
          app:
            image:
              repository: docker.io/prodrigestivill/postgres-backup-local
              tag: 18@sha256:f70742ebe42b2277689b028d1fd15aa80f77cffa01da163cc9f85a6ff1866e7f
            command: [/backup.sh]
            env:
              BACKUP_DIR: /backups
              BACKUP_KEEP_DAYS: "7"
              BACKUP_KEEP_MINS: "7200"
              BACKUP_KEEP_MONTHS: "6"
              BACKUP_KEEP_WEEKS: "4"
              BACKUP_LATEST_TYPE: symlink
              POSTGRES_EXTRA_OPTS: -b -C -c -Z6
              POSTGRES_HOST: postgres-rw.database.svc.cluster.local
              POSTGRES_DB: sure authentik
              SCHEDULE: "@daily"
              TZ: Asia/Kuala_Lumpur
            envFrom:
              - secretRef:
                  name: &secret cloudnative-pg-backup-secret
    persistence:
      backups:
        type: nfs
        server: smb.cloudjur.com
        path: /tank/Backup/Database

  # docker run --rm --tty --interactive \
  # -v "$(pwd)/postgres-20260605.sql.gz:/tmp/backupfile.sql.gz" \
  # postgres:16.2 \
  # /bin/sh -c "zcat /tmp/backupfile.sql.gz | psql --host=10.10.30.11 --port=5432 --username=postgres --dbname=sure -W"
