---
# yaml-language-server: $schema=https://crd.cloudjur.com/postgresql.cnpg.io/scheduledbackup_1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres
spec:
  schedule: "@daily"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: postgres
# ## MANUAL TRIGGER REFERENCE
---
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  labels:
    app.kubernetes.io/name: cloudnative-pg-cluster
  name: postgres
  namespace: database
spec:
  cluster:
    name: postgres
  method: barmanObjectStore
