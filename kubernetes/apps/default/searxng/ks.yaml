# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: searxng
  namespace: flux-system
spec:
  targetNamespace: default
  path: ./kubernetes/apps/default/searxng/app
  prune: true
  commonMetadata:
    labels:
      app.kubernetes.io/name: searxng
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      SUBDOMAIN: search
      APP: searxng
