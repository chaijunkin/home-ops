# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sure
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
        target:
          kind: Deployment
  values:
    defaultPodOptions:
      enableServiceLinks: false

    controllers:
      web:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: sure-secret
        containers:
          app:
            image:
              repository: ghcr.io/we-promise/sure
              tag: stable@sha256:67089f799ac99ca65266d7d218d2207aa19fef1fda562fc2797ef04ee858b71a
            envFrom:
              - secretRef:
                  name: sure-secret

            env:
              TZ: Asia/Kuala_Lumpur
              PORT: &port 3000
              SELF_HOSTED: "true"
              ONBOARDING_STATE: open
              APP_DOMAIN: https://sure.cloudjur.com
              RAILS_ASSUME_SSL: "true"
              RAILS_FORCE_SSL: "false"
              RAILS_ENV: production
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/10
              RAILS_MAX_THREADS: "1"
              MALLOC_ARENA_MAX: "1"
            # probes:
            #   startup:
            #     enabled: true
            #     custom: true
            #     spec:
            #       tcpSocket:
            #         port: *port
            #       initialDelaySeconds: 10
            #       periodSeconds: 10
            #       timeoutSeconds: 5
            #       failureThreshold: 30
            #   liveness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       tcpSocket:
            #         port: *port
            #       periodSeconds: 30
            #       timeoutSeconds: 5
            #       failureThreshold: 5
            #   readiness:
            #     enabled: true
            #     custom: true
            #     spec:
            #       tcpSocket:
            #         port: *port
            #       periodSeconds: 10
            #       timeoutSeconds: 5
            #       failureThreshold: 6
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 2Gi

      worker:
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: sure-secret
        containers:
          app:
            image:
              repository: ghcr.io/we-promise/sure
              tag: stable
            command:
              - bundle
              - exec
              - sidekiq
            envFrom:
              - secretRef:
                  name: sure-secret
            env:
              SELF_HOSTED: "true"
              ONBOARDING_STATE: open
              APP_DOMAIN: https://sure.cloudjur.com
              RAILS_ASSUME_SSL: "true"
              RAILS_FORCE_SSL: "false"
              RAILS_ENV: production
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379/10
              RAILS_MAX_THREADS: "1"
              MALLOC_ARENA_MAX: "1"
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 1Gi

    service:
      web:
        controller: web
        ports:
          http:
            port: *port

    route:
      web:
        hostnames: [sure.cloudjur.com]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: web
                port: *port

    persistence:
      storage:
        existingClaim: sure
        advancedMounts:
          web:
            app:
              - path: /rails/storage
          worker:
            app:
              - path: /rails/storage
