---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trek
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    timeout: 2m
  upgrade:
    timeout: 2m
  values:
    controllers:
      *app :
        pod:
          hostUsers: false
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: true
            seccompProfile: { type: RuntimeDefault }

        containers:
          app:
            image:
              repository: mirror.gcr.io/mauriceboe/trek
              tag: 3.0.21@sha256:79f88110b76980b261b81d1313ec82ee393149d97ae672e87a83e0b158e361a0
            args: ["node", "--import", "tsx", "src/index.ts"]
            env:
              APP_URL: https://{{ .Release.Name }}.cloudjur.com
              ALLOWED_ORIGINS: https://{{ .Release.Name }}.cloudjur.com
              ALLOW_INTERNAL_NETWORK: true
              TRUST_PROXY: true
              FORCE_HTTPS: true
              TZ: "Asia/Kuala_Lumpur"
              ENCRYPTION_KEY:
                secretKeyRef:
                  name: trek-secret
                  key: ENCRYPTION_KEY
              OIDC_ONLY: true
              OIDC_ADMIN_CLAIM: groups
              OIDC_ADMIN_VALUE: admins
              OIDC_SCOPE: openid email profile groups
              OIDC_DISPLAY_NAME: Authentik
              OIDC_ISSUER: "https://auth.${SECRET_DOMAIN}/application/o/trek/"
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: trek-secret
                    key: OIDC_CLIENT_ID
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: trek-secret
                    key: OIDC_CLIENT_SECRET

              # SMTP_HOST: smtp-relay.cluster-infra
              # SMTP_PORT: 25
              # SMTP_FROM: TREK <trek@cloudjur.com>
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 3000
                    path: /api/health
              liveness: *probes
            resources:
              requests:
                cpu: 12m
                memory: 128M
              limits:
                memory: 512M
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: { type: RuntimeDefault }
              capabilities: { drop: ["ALL"] }

    service:
      main:
        ports:
          http:
            port: *port

    route:
      main:
        hostnames: ["{{ .Release.Name }}.cloudjur.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Application Service
          gethomepage.dev/name: trek
          gethomepage.dev/icon: mdi-application
          gethomepage.dev/description: Travel Collaboration
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
            subPath: data
          - path: /app/uploads
            subPath: uploads
