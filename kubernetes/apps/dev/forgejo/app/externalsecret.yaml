# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo
spec:
  target:
    name: forgejo-secret
    creationPolicy: Owner
    template:
      data:
        ADMIN_USER: "{{ .forgejo_admin_user }}"
        ADMIN_PASSWORD: "{{ .forgejo_admin_password }}"
        APP_SECRET_KEY: "{{ .forgejo_app_secret_key }}"
  data:
    - secretKey: forgejo_admin_user
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 741ab874-d619-4bed-a307-8b67ea13f4c1
        property: username
    - secretKey: forgejo_admin_password
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: 741ab874-d619-4bed-a307-8b67ea13f4c1
        property: password
    - secretKey: forgejo_app_secret_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 741ab874-d619-4bed-a307-8b67ea13f4c1
        property: app_secret_key
---
# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-signing-key
spec:
  target:
    name: forgejo-signing-key
    creationPolicy: Owner
    template:
      data:
        # Private key (no passphrase): ssh-keygen -t ed25519 -f forgejo_signing -N ""
        ed25519: "{{ .forgejo_signing_private_key }}"
        ed25519.pub: "{{ .forgejo_signing_public_key }}"
  data:
    - secretKey: forgejo_signing_private_key
      sourceRef:
        storeRef:
          name: bitwarden-notes
          kind: ClusterSecretStore
      remoteRef:
        key: 741ab874-d619-4bed-a307-8b67ea13f4c1
    - secretKey: forgejo_signing_public_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 741ab874-d619-4bed-a307-8b67ea13f4c1
        property: signing_public_key
