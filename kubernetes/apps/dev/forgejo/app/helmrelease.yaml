# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 30m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    gitea:
      admin:
        existingSecret: forgejo-secret
      config:
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://dragonfly.database.svc.cluster.local:6379/3?pool_size=100&idle_timeout=180s
        cron.archive_cleanup:
          ENABLED: true
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
          OLDER_THAN: 2h
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        lfs:
          PATH: /data/git/lfs
        mailer:
          ENABLED: false
        openid:
          ENABLE_OPENID_SIGNIN: true
          ENABLE_OPENID_SIGNUP: true
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.database.svc.cluster.local:6379/3?pool_size=100&idle_timeout=180s
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/signing/ed25519.pub
          SIGNING_NAME: git.cloudjur.com Instance
          SIGNING_EMAIL: noreply@git.cloudjur.com
          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey
        security:
          REVERSE_PROXY_TRUSTED_PROXIES: 10.69.0.0/16
        server:
          APP_DATA_PATH: /data/gitea
          ROOT_URL: https://git.cloudjur.com
          SSH_DOMAIN: git.cloudjur.com
          SSH_PORT: &sshPort 22
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
        service:
          DEFAULT_ENABLE_TIMETRACKING: false
          SHOW_REGISTRATION_BUTTON: false
          # ============================================================
          # TOGGLE: Uncomment the 3 lines below when enabling OIDC.
          # ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          # ENABLE_INTERNAL_SIGNIN: false
          # ENABLE_PASSWORD_SIGNIN_FORM: false
          # ============================================================
        service.explore:
          DISABLE_CODE_PAGE: false
          DISABLE_ORGANIZATIONS_PAGE: true
          DISABLE_USERS_PAGE: true
          REQUIRE_SIGNIN_VIEW: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.database.svc.cluster.local:6379/3?pool_size=100&idle_timeout=180s
          SESSION_LIFE_TIME: "1209600"
        webhook:
          ALLOWED_HOST_LIST: "*"
      # ============================================================
      # TOGGLE: Uncomment the oauth block below to enable OIDC.
      # Also update the `openid` and `service` blocks above.
      # ============================================================
      oauth:
        - name: authentik
          provider: openidConnect
          autoDiscoverUrl: https://auth.cloudjur.com/application/o/forgejo/.well-known/openid-configuration
          existingSecret: forgejo-authentik-oidc
          scopes: openid profile email
          groupClaimName: groups
    extraContainerVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraInitVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraVolumes:
      - name: signing-key
        secret:
          secretName: forgejo-signing-key
          defaultMode: 0400
    httpRoute:
      enabled: false
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.3-rootless
    persistence:
      create: false
      claimName: forgejo
    service:
      ssh:
        port: *sshPort
    # Uncomment to expose SSH via envoy-external (requires a TCP/SSH listener on the gateway)
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: ssh
