# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitwarden-sdk-server
  namespace: external-secrets
spec:
  path: ./kubernetes/apps/external-secrets/bitwarden-sdk-server/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: bitwarden-sdk-server
  targetNamespace: external-secrets
  wait: true
  interval: 24h
  retryInterval: 1m
  timeout: 5m
