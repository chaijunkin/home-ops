# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitwarden
  namespace: external-secrets
spec:
  path: ./kubernetes/apps/external-secrets/bitwarden/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: bitwarden
  targetNamespace: external-secrets
  wait: true
  interval: 24h
  retryInterval: 1m
  timeout: 5m
---
# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: external-secrets
spec:
  path: ./kubernetes/apps/external-secrets/external-secrets/stores
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: external-secrets-stores
  wait: true
  interval: 24h
  retryInterval: 1m
  timeout: 5m
  targetNamespace: external-secrets
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: bitwarden
      namespace: external-secrets
