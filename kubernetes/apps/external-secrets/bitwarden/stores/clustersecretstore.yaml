# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-login
spec:
  provider:
    webhook:
      url:
        http://bitwarden.external-secrets.svc.cluster.local:8087/object/item/{{
        .remoteRef.key }}
      headers:
        Content-Type: application/json
      result:
        jsonPath: $.data.login.{{ .remoteRef.property }}
---
# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/clustersecretstore_v1.json
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-fields
spec:
  provider:
    webhook:
      url:
        http://bitwarden.external-secrets.svc.cluster.local:8087/object/item/{{
        .remoteRef.key }}
      result:
        jsonPath: $.data.fields[?@.name=="{{ .remoteRef.property }}"].value
---
