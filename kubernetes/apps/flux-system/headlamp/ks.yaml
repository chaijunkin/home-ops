# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app headlamp
  namespace: flux-system
spec:
  path: ./kubernetes/apps/flux-system/headlamp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 24h
  retryInterval: 1m

  targetNamespace: flux-system
  postBuild:
    substitute:
      APP: *app
      # SUBDOMAIN: k8s
