---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ark-game
  namespace: games
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ark-cluster
  namespace: games
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ark-save-ragnarok
  namespace: games
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 10Gi
