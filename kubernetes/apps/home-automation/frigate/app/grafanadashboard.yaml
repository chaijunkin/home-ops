# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: network-frigate
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: network-folder
  grafanaCom:
    id: 18226
    revision: 9
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
