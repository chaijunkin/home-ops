# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: frigate
  namespace: home-automation
spec:
  targetNamespace: home-automation
  commonMetadata:
    labels:
      app.kubernetes.io/name: frigate
  dependsOn:
    - name: openebs
      namespace: storage
  path: ./kubernetes/apps/home-automation/frigate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 24h
  retryInterval: 1m
  timeout: 30m
  postBuild:
    substitute:
      APP: frigate
      VOLSYNC_CAPACITY: 5Gi
  components:
    - ../../../../components/volsync
    - ../../../../components/zeroscaler
