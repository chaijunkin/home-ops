# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: home-automation
spec:
  targetNamespace: home-automation
  interval: 24h
  retryInterval: 1m

  path: ./kubernetes/apps/home-automation/home-assistant/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  postBuild:
    substitute:
      APP: home-assistant
      SUBDOMAIN: hass
      VOLSYNC_CAPACITY: 5Gi
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: openebs
      namespace: storage
