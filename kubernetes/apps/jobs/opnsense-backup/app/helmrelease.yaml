---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opnsense-backup
spec:
  chartRef:
    kind: OCIRepository
    name: opnsense-backup
  interval: 1h
  values:
    controllers:
      main:
        type: cronjob
        cronjob:
          concurrencyPolicy: Forbid
          schedule: "@daily"
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
        containers:
          main:
            image:
              repository: ghcr.io/chaijunkin/linux-utility
              tag: rolling@sha256:b89a7e2fe789086676331ed36bd565f29c41a0de6f86b47adef2b32e56ad298c
            command:
              - "/bin/bash"
              - "/app/opnsense-backup.sh"
            env:
              OPNSENSE_URL: "https://gateway.cloudjur.com"
            envFrom:
              - secretRef:
                  name: *app
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    persistence:
      data:
        type: nfs
        server: smb.cloudjur.com
        path: /tank/Backup/Config/Opnsense
      script:
        type: configMap
        name: *app
        defaultMode: 0775
        globalMounts:
          - path: /app/opnsense-backup.sh
            subPath: opnsense-backup.sh
            readOnly: true
      tmp:
        type: emptyDir
