# yaml-language-server: $schema=https://crd.cloudjur.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.19.3
  url: oci://quay.io/cilium/charts/cilium
---
# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 1h # interval: 1h
  chartRef:
    kind: OCIRepository
    name: cilium
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
  values:
    hubble:
      enabled: true
      serviceMonitor:
        enabled: true
      metrics:
        dashboards:
          enabled: false
          namespace: monitoring
          annotations:
            grafana_folder: Cilium
        enabled:
          - dns:query;ignoreAAAA
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: true
      ui:
        enabled: true
        service:
          type: LoadBalancer
          annotations:
            lbipam.cilium.io/ips: 10.10.30.133
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: Platform Infrastructure
            gethomepage.dev/name: Hubble
            gethomepage.dev/description: Cilium's observability platform
            gethomepage.dev/icon: https://raw.githubusercontent.com/chaijunkin/dashboard-icons/main/png/cilium.png
        rollOutPods: true
      dashboards:
        enabled: true
        namespace: monitoring
        annotations:
          grafana_folder: Cilium
