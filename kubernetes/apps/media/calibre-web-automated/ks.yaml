# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calibre-web-automated
  namespace: media
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: calibre-web-automated
  path: ./kubernetes/apps/media/calibre-web-automated/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  postBuild:
    substitute:
      APP: calibre-web-automated
      SUBDOMAIN: books
      VOLSYNC_CAPACITY: 15Gi
  prune: true
  wait: false
  interval: 24h
  components:
    - ../../../../components/zeroscaler
    - ../../../../components/volsync-no-r2
  dependsOn:
    - name: openebs
      namespace: storage
