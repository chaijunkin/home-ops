# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  dependsOn:
    - name: plex
      namespace: media
  values:
    controllers:
      maintainerr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.10.2@sha256:b6a8c18a1f72d26d0c290bc7002ab766def19eca0f28bc2fa1ab9ae7cd7de06c
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          http:
            port: &port 6246

    persistence:
      data:
        existingClaim: maintainerr-data
        globalMounts:
          - path: /opt/data

    route:
      app:
        hostnames:
          - maintainerr.cloudjur.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
