---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  dependsOn:
    - name: plex
      namespace: media
  values:
    controllers:
      maintainerr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.10.1@sha256:afc7e45c3d32eeea32946420c592802e6daf33f222114ce54c4a086a53b9838e
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          http:
            port: &port 6246

    persistence:
      data:
        existingClaim: maintainerr-data
        globalMounts:
          - path: /opt/data

    route:
      app:
        hostnames:
          - maintainerr.cloudjur.com
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
