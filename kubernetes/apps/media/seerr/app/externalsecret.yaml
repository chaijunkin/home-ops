# yaml-language-server: $schema=https://crd.cloudjur.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name seerr-secret
spec:
  target:
    name: *name
    template:
      data:
        API_KEY: "{{ .SEERR_API_KEY }}"
  data:
    - secretKey: SEERR_API_KEY
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 124108a5-0598-4486-948e-cc37eea060e7
        property: api_token
