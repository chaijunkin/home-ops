# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: data-syncthing-overview
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: data-folder
  grafanaCom:
    id: 24238
    revision: 3
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
