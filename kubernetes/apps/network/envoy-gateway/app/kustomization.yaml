# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./envoy.yaml
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./observability.yaml
  - ./ocirepository.yaml
    # - ./scaledobject.yaml
configMapGenerator:
  - name: envoy-external-extensions
    files:
      - resources/block-user-agents.lua
  - name: envoy-internal-extensions
    files:
      - resources/block-user-agents.lua
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
