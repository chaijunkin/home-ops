# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-opnsense-unbound
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: external-dns
  install:
    disableSchemaValidation: true
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    disableSchemaValidation: true
    remediation:
      retries: 3
  values:
    fullnameOverride: *app
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/crutonjohn/external-dns-opnsense-webhook
          tag: v1.0.0@sha256:0bf02fe18db4fe3a86fe5f561313ee434a203f4dcee7d19e770f67df854f3cff
        env:
          # - name: SERVER_HOST
          #   value: 0.0.0.0
          # - name: SERVER_PORT
          #   value: "8080"
          - name: OPNSENSE_SKIP_TLS_VERIFY
            value: "true"
          - name: OPNSENSE_API_SECRET
            valueFrom:
              secretKeyRef:
                name: external-dns-opnsense-secret
                key: OPNSENSE_API_SECRET
          - name: OPNSENSE_API_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-opnsense-secret
                key: OPNSENSE_API_KEY
          - name: OPNSENSE_HOST
            valueFrom:
              secretKeyRef:
                name: external-dns-opnsense-secret
                key:
                  OPNSENSE_HOST
                  # - name: OPNSENSE_SKIP_TLS_VERIFY
                  #   value: "true"
                  # - name: LOG_LEVEL
                  #   value: "debug"
        securityContext:
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            memory: 20Mi
            cpu: 10m
          limits:
            memory: 100Mi
    triggerLoopOnEvent: true
    # logLevel: debug
    policy: sync
    extraArgs:
      # - --ignore-ingress-tls-spec
      # - --webhook-provider-url=http://localhost:8080
      # - --webhook-provider-read-timeout=1m
      # - --webhook-provider-write-timeout=1m
      - --gateway-name=envoy-internal
        # - --managed-record-types=A
        # - --managed-record-types=AAAA
        # - --managed-record-types=TXT
    registry: txt
    sources:
      # - crd
      #- ingress
      - gateway-grpcroute
      - gateway-httproute
      - gateway-tlsroute
      - gateway-udproute
      - gateway-tcproute
      - service

    txtOwnerId: default
    txtPrefix: k8s.
    domainFilters:
      - cloudjur.com

    # Metrics
    metrics:
      enabled: true
      port: 7979
    serviceMonitor:
      enabled: true
    podAnnotations:
      reloader.stakater.com/auto: "true"
