# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: network-opnsense
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS-K0
  folderRef: network-folder
  grafanaCom:
    id: 21113
    revision: 1
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
