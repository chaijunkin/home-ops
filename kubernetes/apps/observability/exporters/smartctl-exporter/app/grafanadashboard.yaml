# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_1beta1.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: kubernetes-smartctl-exporter
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: kubernetes-folder
  grafanaCom:
    id: 22604
    revision: 2
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: system-smartctl-exporter
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: system-folder
  grafanaCom:
    id: 22604
    revision: 2
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
