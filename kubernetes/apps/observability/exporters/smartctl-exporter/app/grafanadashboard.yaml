  name: system-smartctl-exporter
spec:
  allowCrossNamespaceImport: true
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  folderRef: system-folder
  grafanaCom:
    id: 22604
    revision: 2
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
