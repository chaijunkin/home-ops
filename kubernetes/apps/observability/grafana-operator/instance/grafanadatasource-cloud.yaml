# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: prometheus
    name: home-ops-prometheus
    uid: home-ops-prometheus
    access: proxy
    isDefault: true
    url: https://prometheus-ext.cloudjur.com
    jsonData:
      timeInterval: 1m
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer ${grafana_cloud_datasource_token}
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-datasources
          key: grafana_cloud_datasource_token
---
# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
