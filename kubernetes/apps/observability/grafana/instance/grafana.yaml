---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    grafana.internal/instance: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    auth:
      oauth_auto_login: "true"
      disable_login_form: "false"
      oauth_allow_insecure_email_lookup: "true"
    auth.anonymous:
      enabled: "false"
    auth.generic_oauth:
      allow_assign_grafana_admin: "true"
      api_url: https://auth.cloudjur.com/application/o/userinfo/
      auth_url: https://auth.cloudjur.com/application/o/authorize/
      enabled: "true"
      icon: signin
      name: authentik
      role_attribute_path: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
      scopes: openid email profile offline_access
      signout_redirect_url: https://auth.cloudjur.com/application/o/grafana/end-session/
      token_url: https://auth.cloudjur.com/application/o/token/
      use_pkce: "true"
      use_refresh_token: "true"
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
      allow_loading_unsigned_plugins: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
    security:
      angular_support_enabled: "true"
    server:
      enable_gzip: "true"
      root_url: https://grafana.cloudjur.com
  disableDefaultAdminSecret: true
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              # envFrom:
              #   - secretRef:
              #       name: grafana-secret
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      key: GF_SECURITY_ADMIN_USER
                      name: grafana-secret
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: GF_SECURITY_ADMIN_PASSWORD
                      name: grafana-secret
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                - name: GF_DATE_FORMATS_USE_BROWSER_LOCALE
                  value: "true"
                - name: GF_EXPLORE_ENABLED
                  value: "true"
                - name: GF_FEATURE_TOGGLES_ENABLE
                  value: publicDashboards
                - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
                  value: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
                - name: GF_INSTALL_PLUGINS
                  value: grafana-clock-panel,grafana-piechart-panel,grafana-worldmap-panel,natel-discrete-panel,pr0ps-trackmap-panel,vonage-status-panel,fifemon-graphql-datasource,grafana-pyroscope-app,yesoreyeram-infinity-datasource
                - name: GF_SECURITY_ANGULAR_SUPPORT_ENABLED
                  value: "true"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
  httpRoute:
    metadata:
      annotations:
        gatus.home-operations.com/endpoint: |-
          name: grafana
          url: https://grafana.cloudjur.com/api/health
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Observability Service
        gethomepage.dev/name: Grafana
        gethomepage.dev/description: Analytics & Monitoring
        gethomepage.dev/icon: https://raw.githubusercontent.com/chaijunkin/dashboard-icons/main/png/grafana.png
    spec:
      hostnames: ["grafana.cloudjur.com"]
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: https
      rules:
        - backendRefs:
            - name: grafana-service
              port: 3000
  disableDefaultSecurityContext: All
