apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  labels:
    grafana.internal/instance: grafana
  name: cloudflare-r2-dashboard
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  folderRef: external-folder
  json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "$datasource"
          },
          "description": "Total storage across all R2 buckets",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 107374182400
                  },
                  {
                    "color": "red",
                    "value": 536870912000
                  }
                ]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 3,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "percentChangeColorMode": "standard",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "12.4.0-19174562009.patch3",
          "targets": [
            {
              "columns": [
                {
                  "selector": "dimensions.bucketName",
                  "text": "Bucket",
                  "type": "string"
                },
                {
                  "selector": "max.metadataSize",
                  "text": "metadataSize",
                  "type": "number"
                },
                {
                  "selector": "max.payloadSize",
                  "text": "payloadSize",
                  "type": "number"
                }
              ],
              "datasource": {
                "type": "yesoreyeram-infinity-datasource",
                "uid": "$datasource"
              },
              "format": "table",
              "refId": "A",
              "root_selector": "data.viewer.accounts[0].storage",
              "source": "url",
              "type": "graphql",
              "url": "https://api.cloudflare.com/client/v4/graphql",
              "url_options": {
                "body_graphql_query": "query { viewer { accounts(filter: {accountTag: \"${accountTag}\"}) { storage: r2StorageAdaptiveGroups(orderBy: [bucketName_ASC], limit: 1000, filter: {date_geq: \"${__from:date:YYYY-MM-DD}\", date_leq: \"${__to:date:YYYY-MM-DD}\"}) { dimensions { bucketName } max { metadataSize payloadSize } } } } }",
                "body_type": "graphql",
                "headers": [
                  {
                    "key": "Content-Type",
                    "value": "application/json"
                  }
                ],
                "method": "POST"
              }
            }
          ],
          "title": "Account Total Storage Usage",
          "transformations": [
            {
              "id": "calculateField",
              "options": {
                "alias": "Total",
                "binary": {
                  "left": "metadataSize",
                  "operator": "+",
                  "right": "payloadSize"
                },
                "mode": "binary"
              }
            },
            {
              "id": "reduce",
              "options": {
                "reducers": [
                  "sum"
                ]
              }
            }
          ],
          "type": "stat"
        },
        {
          "datasource": {
            "type": "yesoreyeram-infinity-datasource",
            "uid": "$datasource"
          },
          "description": "Storage metrics breakdown",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  }
                ]
              },
              "unit": "decbytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 3,
            "x": 3,
            "y": 0
          },
          "id": 2,
          "options": {
            "displayMode": "basic",
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": false
            },
            "maxVizHeight": 300,
            "minVizHeight": 16,
            "minVizWidth": 8,
            "namePlacement": "auto",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [],
              "fields": "",
              "values": true
            },
            "showUnfilled": true,
            "showValue": "always",
            "sizing": "auto",
            "valueMode": "color"
          },
          "pluginVersion": "12.4.0-19174562009.patch3",
          "targets": [
            {
              "columns": [
                {
                  "selector": "dimensions.bucketName",
                  "text": "Bucket",
                  "type": "string"
                },
                {
                  "selector": "max.metadataSize",
                  "text": "metadataSize",
                  "type": "number"
                },
                {
                  "selector": "max.payloadSize",
                  "text": "payloadSize",
                  "type": "number"
                }
              ],
              "datasource": {
                "type": "yesoreyeram-infinity-datasource",
                "uid": "$datasource"
              },
              "format": "table",
              "refId": "A",
              "root_selector": "data.viewer.accounts[0].storage",
              "source": "url",
              "type": "graphql",
              "url": "https://api.cloudflare.com/client/v4/graphql",
              "url_options": {
                "body_graphql_query": "query { viewer { accounts(filter: {accountTag: \"${accountTag}\"}) { storage: r2StorageAdaptiveGroups(orderBy: [bucketName_ASC], limit: 1000, filter: {date_geq: \"${__from:date:YYYY-MM-DD}\", date_leq: \"${__to:date:YYYY-MM-DD}\"}) { dimensions { bucketName } max { metadataSize payloadSize } } } } }",
                "body_type": "graphql",
                "headers": [
                  {
                    "key": "Content-Type",
                    "value": "application/json"
