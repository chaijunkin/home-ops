# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: prometheus
    name: prometheus
    uid: prometheus
    access: proxy
    isDefault: true
    url: https://prometheus-ext.cloudjur.com
    jsonData:
      timeInterval: 1m
---
# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: loki
    name: loki
    uid: loki
    access: proxy
    url: https://loki-ext.cloudjur.com
    jsonData:
      maxLines: 250
---
# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: alertmanager-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: alertmanager
    name: alertmanager
    uid: alertmanager
    access: proxy
    url: https://alertmanager-ext.cloudjur.com
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: true
---
# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: tempo
    name: tempo
    uid: tempo
    access: proxy
    url: https://tempo-ext.cloudjur.com
    jsonData:
      nodeGraph:
        enabled: true
      spanBar:
        type: None
      timeout: 15
      traceIdTimeParams:
        enabled: true
      tracesToLogsV2:
        customQuery: false
        datasourceUid: loki
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
        tags: [job, instance, pod, namespace]
        filterByTraceID: false
        filterBySpanID: false
        query: method="${__span.tags.method}"
      lokiSearch:
        datasourceUid: loki
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
        tags: [{key: service.name, value: service}, key: job]
        queries:
          - name: Sample query
            query: sum(rate(traces_spanmetrics_latency_bucket{${__tags}[5m]))
      tracesToProfiles:
        datasourceUid: pyroscope
        tags: [service.name, service.namespace]
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: 1h
        spanEndTimeShift: -1h
---
# yaml-language-server: $schema=https://crd.cloudjur.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: pyroscope-cloud
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana-cloud
  datasource:
    type: grafana-pyroscope-datasource
    name: pyroscope
    uid: pyroscope
    access: proxy
    url: https://pyroscope-ext.cloudjur.com
    jsonData:
      tracesToProfiles:
        datasourceUid: tempo
        tags: [service.name, service.namespace]
