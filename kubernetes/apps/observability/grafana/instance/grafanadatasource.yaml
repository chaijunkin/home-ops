---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: prometheus
    name: prometheus
    uid: prometheus
    access: proxy
    isDefault: true
    url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
    jsonData:
      timeInterval: 1m
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: loki
    name: loki
    uid: loki
    access: proxy
    url: http://loki-headless.observability.svc.cluster.local:3100
    jsonData:
      maxLines: 250
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: alertmanager
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: alertmanager
    name: alertmanager
    uid: alertmanager
    access: proxy
    url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
    jsonData:
      implementation: prometheus
      handleGrafanaManagedAlerts: true
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: tempo
    name: tempo
    uid: tempo
    access: proxy
    url: http://tempo.observability.svc.cluster.local:3200
    jsonData:
      nodeGraph:
        enabled: true
      spanBar:
        type: None
      timeout: 15
      traceIdTimeParams:
        enabled: true
      tracesToLogsV2:
        customQuery: false
        datasourceUid: loki
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
        tags: ["job", "instance", "pod", "namespace"]
        filterByTraceID: false
        filterBySpanID: false
        query: 'method="${__span.tags.method}"'
      lokiSearch:
        datasourceUid: loki
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
        tags: [{key: "service.name", value: "service"}, {key: "job"}]
        queries:
          - name: "Sample query"
            query: "sum(rate(traces_spanmetrics_latency_bucket{${__tags}[5m]))"
      tracesToProfiles:
        datasourceUid: pyroscope
        tags: ["service.name", "service.namespace"]
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "1h"
        spanEndTimeShift: "-1h"
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: pyroscope
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: grafana-pyroscope-datasource
    name: pyroscope
    uid: pyroscope
    access: proxy
    url: http://pyroscope.observability.svc.cluster.local:4040
    jsonData:
      tracesToProfiles:
        datasourceUid: tempo
        tags: ["service.name", "service.namespace"]
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-on-fly
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: prometheus
    name: prometheus_on_fly
    uid: prometheus_on_fly
    access: proxy
    url: "${fly_io_prometheus_url}"
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: "${fly_io_readonly_token}"
  valuesFrom:
    - targetPath: "url"
      valueFrom:
        secretKeyRef:
          name: grafana-datasources
          key: fly_io_prometheus_url
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: grafana-datasources
          key: fly_io_readonly_token
---
# yaml-language-server: $schema=https://crd.movishell.pl/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: infinity-cloudflare
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasource:
    type: yesoreyeram-infinity-datasource
    name: infinity-cloudflare
    uid: infinity-cloudflare
    access: proxy
    url: https://api.cloudflare.com/client/v4
    isDefault: false
    editable: true
    jsonData:
      httpHeaderName1: "Authorization"
    secureJsonData:
      httpHeaderValue1: "Bearer ${ro_user_api_token}"
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: grafana-datasources
          key: ro_user_api_token
