# yaml-language-server: $schema=https://crd.cloudjur.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alloy-logs
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability Service
    gethomepage.dev/name: Alloy Logs
    gethomepage.dev/description: Logs Collector
    gethomepage.dev/icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/png/grafana.png
spec:
  hostnames: [alloy-logs.cloudjur.com]
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: k8s-monitoring-alloy-logs
          namespace: observability
          port: 12345
---
