# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app loki
  namespace: observability
spec:
  targetNamespace: observability
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
    - name: openebs
      namespace: storage
  path: ./kubernetes/apps/observability/loki/app
  prune: true
  # postBuild:
  #   substitute:
  #     APP: *app
  #     EXT_AUTH_TARGET: loki-ext
  # components:
  #   - ../../../../components/ext-auth
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 10m
