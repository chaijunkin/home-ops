# yaml-language-server: $schema=https://crd.cloudjur.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pyroscope-ext
spec:
  hostnames:
    - pyroscope-ext.cloudjur.com
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: pyroscope
          port: 4040
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
        - path:
            type: PathPrefix
            value: /querier.v1.QuerierService/
        - path:
            type: PathPrefix
            value: /render
        - path:
            type: PathPrefix
            value: /render-diff
    - backendRefs:
        - group: ""
          kind: Service
          name: pyroscope
          port: 4040
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /push.v1.PusherService/
        - path:
            type: PathPrefix
            value: /ingest
    - backendRefs:
        - group: ""
          kind: Service
          name: pyroscope
          port: 4040
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /settings.v1.SettingsService/
    - backendRefs:
        - group: ""
          kind: Service
          name: pyroscope
          port: 4040
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /adhocprofiles.v1.AdHocProfileService/
