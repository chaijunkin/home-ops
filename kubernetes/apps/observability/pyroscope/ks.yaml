# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pyroscope
  namespace: &namespace observability
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/observability/pyroscope/app
  prune: true
  # postBuild:
  #   substitute:
  #     APP: *app
  #     EXT_AUTH_TARGET: pyroscope-ext
  # components:
  #   - ../../../../components/ext-auth
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
  interval: 1h
  retryInterval: 2m
  timeout: 10m
