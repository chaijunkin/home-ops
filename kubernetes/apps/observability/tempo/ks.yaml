# yaml-language-server: $schema=https://crd.cloudjur.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app tempo
  namespace: &namespace observability
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: openebs
      namespace: storage
  path: ./kubernetes/apps/observability/tempo/app
  prune: true
  postBuild:
    substitute:
      APP: *app
      EXT_AUTH_TARGET: tempo-ext
      EXT_AUTH_BACKEND_REF: authentik-server
  components:
    - ../../../../components/ext-auth
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
  interval: 1h
  retryInterval: 2m
  timeout: 10m
