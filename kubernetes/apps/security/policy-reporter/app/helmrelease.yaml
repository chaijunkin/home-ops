# yaml-language-server: $schema=https://crd.cloudjur.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: policy-reporter
spec:
  interval: 10m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/kyverno/charts/policy-reporter
  ref:
    tag: 3.7.4
---
# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
spec:
  interval: 24h
  chartRef:
    kind: OCIRepository
    name: policy-reporter
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ui:
      enabled: true
      crds:
        customBoard: true
    plugin:
      kyverno:
        enabled: false
      trivy:
        enabled: true
    monitoring:
      enabled: true
      serviceMonitor:
        enabled: true
    emailReports:
      clusterName: main
      titlePrefix: Policy Report
      smtp:
        secret: policy-reporter-smtp
      summary:
        enabled: true
        schedule: "20 15 * * *"
        activeDeadlineSeconds: 300
        backoffLimit: 1
        ttlSecondsAfterFinished: 60
        to: ["apphub@cloudjur.com"]
      violations:
        enabled: true
        schedule: "20 15 * * *"
        activeDeadlineSeconds: 300
        backoffLimit: 1
        ttlSecondsAfterFinished: 60
        to: ["apphub@cloudjur.com"]
    target:
      crd: true
      loki:
        host: http://loki-headless.observability.svc.cluster.local:3100
