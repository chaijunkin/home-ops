# yaml-language-server: $schema=https://crd.cloudjur.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tetragon
spec:
  interval: 10m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/home-operations/charts-mirror/tetragon
  ref:
    tag: 1.7.0
---
# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
spec:
  interval: 24h
  chartRef:
    kind: OCIRepository
    name: tetragon
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    tetragon:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
