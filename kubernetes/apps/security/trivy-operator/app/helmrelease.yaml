# yaml-language-server: $schema=https://crd.cloudjur.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: trivy-operator
spec:
  interval: 10m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/aquasecurity/helm-charts/trivy-operator
  ref:
    tag: 0.32.1
---
# yaml-language-server: $schema=https://crd.cloudjur.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  interval: 24h
  chartRef:
    kind: OCIRepository
    name: trivy-operator
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    serviceMonitor:
      enabled: true

    operator:
      replicas: 1
      scanJobsConcurrentLimit: 3
      scanJobTTL: 300s
      scanJobTimeout: 20m
      builtInTrivyServer: true
      vulnerabilityScannerScanOnlyCurrentRevisions: true
      configAuditScannerScanOnlyCurrentRevisions: true
      annotations:
        reloader.stakater.com/auto: "true"

    trivy:
      slow: true
      ignoreUnfixed: true
      mode: ClientServer
      severity: HIGH,CRITICAL
      server:
        # krr: controller=trivy-server container=trivy-server
        resources:
          requests:
            cpu: 17m
            memory: 432Mi
            # ephemeral-storage: "2Gi"
          limits:
            cpu: 1
            memory: 432Mi
            # ephemeral-storage: "2Gi"

    trivyOperator:
      skipResourceByLabels: "app.kubernetes.io/created-by=volsync"

    # krr: controller=trivy-operator container=trivy-operator
    resources:
      requests:
        cpu: 32m
        memory: 1520Mi
      limits:
        memory: 1520Mi

    nodeCollector:
      volumeMounts:
        - name: var-lib-etcd
          mountPath: /var/lib/etcd
          readOnly: true
        - name: var-lib-kubelet
          mountPath: /var/lib/kubelet
          readOnly: true
        - name: var-lib-kube-scheduler
          mountPath: /var/lib/kube-scheduler
          readOnly: true
        - name: var-lib-kube-controller-manager
          mountPath: /var/lib/kube-controller-manager
          readOnly: true
        # - name: etc-systemd
        #   mountPath: /etc/systemd
        #   readOnly: true
        # - name: lib-systemd
        #   mountPath: /lib/systemd/
        #   readOnly: true
        - name: etc-kubernetes
          mountPath: /etc/kubernetes
          readOnly: true
        - name: etc-cni-netd
          mountPath: /etc/cni/net.d/
          readOnly: true
      # -- node-collector pod volumes definition for collecting config files information
      volumes:
        - name: var-lib-etcd
          hostPath:
            path: /var/lib/etcd
        - name: var-lib-kubelet
          hostPath:
            path: /var/lib/kubelet
        - name: var-lib-kube-scheduler
          hostPath:
            path: /var/lib/kube-scheduler
        - name: var-lib-kube-controller-manager
          hostPath:
            path: /var/lib/kube-controller-manager
        # - name: etc-systemd
        #   hostPath:
        #     path: /etc/systemd
        # - name: lib-systemd
        #   hostPath:
        #     path: /lib/systemd
        - name: etc-kubernetes
          hostPath:
            path: /etc/kubernetes
        - name: etc-cni-netd
          hostPath:
            path: /etc/cni/net.d/
