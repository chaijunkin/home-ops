# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      garage:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/dxflrs/garage
              tag: v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
              # kubectl exec -n storage <POD_NAME> -- /garage layout assign -z dc1 -c <NODEID>
            env:
              TZ: Asia/Kuala_Lumpur
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
            resources:
              requests:
                cpu: 5m
                memory: 100Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.30.59
        ports:
          s3:
            port: 3900
          s3-web:
            port: 3902
          api:
            port: 3903
    route:
      s3:
        # annotations:
        #   gatus.home-operations.com/endpoint: |-
        #     conditions: ["[STATUS] == 403"]
        hostnames:
          - s3.cloudjur.com
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: s3
      api:
        # annotations:
        #   gatus.home-operations.com/endpoint: |-
        #     conditions: ["[STATUS] == 400"]
        hostnames:
          - garage.cloudjur.com
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: api
      schema-web:
        hostnames:
          - schema.cloudjur.com
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: s3-web
                # - filters:
                #   - type: URLRewrite
                #     urlRewrite:
                #       hostname: "schema"
      wiki-web:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions:
              - "[CONNECTED] == true"
        hostnames:
          - wiki.cloudjur.com
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          # -------------------------------------------------------------------
          # 1. PRIVACY LAYER: Block all asset discovery unless requested by your site
          # -------------------------------------------------------------------
          - matches:
              - path:
                  type: PathPrefix
                  value: /assets/
                headers:
                  - name: Referer
                    type: RegularExpression
                    value: ^https://wiki\.cloudjur\.com/.*
            backendRefs:
              - identifier: app
                port: s3-web

                # -------------------------------------------------------------------
                # 2. PRIVACY LAYER: Bounce automated scanners back to home
                # -------------------------------------------------------------------
          - matches:
              - path:
                  type: PathPrefix
                  value: /assets/
            filters:
              - type: RequestRedirect
                requestRedirect:
                  statusCode: 302
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /index.html

                # -------------------------------------------------------------------
                # 3. PERFORMANCE LAYER: Aggressive caching for hashed Quartz engine files
                # -------------------------------------------------------------------
          - matches:
              - path:
                  type:
                    RegularExpression
                    # 🚀 Fix: Match any path string that ends with a 8-character hex hash + .css or .js
                  value: .*-[0-9a-f]{8}\.(css|js)$
            filters:
              - type: ResponseHeaderModifier
                responseHeaderModifier:
                  set:
                    - name: Cache-Control
                      value: public, max-age=31536000, immutable
            backendRefs:
              - identifier: app
                port: s3-web

                # -------------------------------------------------------------------
                # 4. ROUTING LAYER: Standard Catch-All for standard web traffic
                # -------------------------------------------------------------------
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: s3-web
    persistence:
      config:
        type: secret
        name: garage-secret
        globalMounts:
          - path: /etc/garage.toml
            subPath: garage.toml
            readOnly: true
      data:
        type: nfs
        server: smb.cloudjur.com
        path: /tank/Apps
        globalMounts:
          - path: /data
            subPath: Garage/data
      meta:
        type: nfs
        server: smb.cloudjur.com
        path: /tank/Apps
        globalMounts:
          - path: /meta
            subPath: Garage/meta
