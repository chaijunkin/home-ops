# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coturn
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    controllers:
      coturn:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/coturn/coturn
              tag: 4.15.0-r0@sha256:0feee4fc1f45c7c053c8fee3e1ab941b1a1b9a0429bc01e18126735410770bfd
            command:
              - /bin/sh
              - -c
              - |
                set -e
                EXTERNAL_IP=$(getent hosts external.cloudjur.com | awk '{print $1}')
                if [ -z "$EXTERNAL_IP" ]; then
                  echo "ERROR: could not resolve external.cloudjur.com" >&2
                  exit 1
                fi
                echo "[entrypoint] external-ip=$EXTERNAL_IP"
                exec turnserver -c /etc/coturn/turnserver.conf \
                  --external-ip "$EXTERNAL_IP" \
                  --static-auth-secret "$TURN_STATIC_AUTH_SECRET"
            envFrom:
              - secretRef:
                  name: coturn
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 256Mi
    persistence:
      config:
        type: configMap
        name: coturn-config
        advancedMounts:
          coturn:
            app:
              - path: /etc/coturn/turnserver.conf
                subPath: turnserver.conf
                readOnly: true
    service:
      app:
        controller: coturn
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.10.30.49
        ports:
          turn-tcp:
            port: 3478
            protocol: TCP
          turn-udp:
            port: 3478
            protocol: UDP
          relay-49160: {port: 49160, protocol: UDP}
          relay-49161: {port: 49161, protocol: UDP}
          relay-49162: {port: 49162, protocol: UDP}
          relay-49163: {port: 49163, protocol: UDP}
          relay-49164: {port: 49164, protocol: UDP}
          relay-49165: {port: 49165, protocol: UDP}
          relay-49166: {port: 49166, protocol: UDP}
          relay-49167: {port: 49167, protocol: UDP}
          relay-49168: {port: 49168, protocol: UDP}
          relay-49169: {port: 49169, protocol: UDP}
          relay-49170: {port: 49170, protocol: UDP}
          relay-49171: {port: 49171, protocol: UDP}
          relay-49172: {port: 49172, protocol: UDP}
          relay-49173: {port: 49173, protocol: UDP}
          relay-49174: {port: 49174, protocol: UDP}
          relay-49175: {port: 49175, protocol: UDP}
          relay-49176: {port: 49176, protocol: UDP}
          relay-49177: {port: 49177, protocol: UDP}
          relay-49178: {port: 49178, protocol: UDP}
          relay-49179: {port: 49179, protocol: UDP}
