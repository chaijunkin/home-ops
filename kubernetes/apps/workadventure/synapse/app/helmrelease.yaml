# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synapse
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 15m
  dependsOn: []
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      synapse:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: synapse
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/synapse
              tag: v1.157.1@sha256:d1fce43d7501428c461f2758dc10342555b946dc9f1d03c1b1b8aec1a4e8d130
            env:
              SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: synapse
                    key: POSTGRES_PASSWORD
            envFrom:
              - secretRef:
                  name: synapse
            ports:
              - name: http
                containerPort: 8008
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 384Mi
              limits:
                memory: 1Gi
    persistence:
      config:
        type: secret
        name: synapse
        globalMounts:
          - path: /data/homeserver.yaml
            subPath: homeserver.yaml
            readOnly: true
          - path: /data/log.config
            subPath: log.config
            readOnly: true
          - path: /data/signing.key
            subPath: signing.key
            readOnly: true
      data:
        existingClaim: synapse
        globalMounts:
          - path: /data
    route:
      app:
        hostnames: [matrix.cloudjur.com]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    service:
      app:
        controller: synapse
        ports:
          http:
            port: 8008
